# HAProxy config for the Log-Based Golden Signals demonstration environment.
# B-09 (issue #23) — ENV-FR-02. Pinned access-log format emitting the ADR-0068
# fields the four Golden Signals require, in the tab-separated `GSLOG` shape the
# gs-log-shipper parser expects (infrastructure/golden-signals/gs-log-shipper).
#
# Timing field choice (ADR-0084 §2 / SPEC-LGS-002 §15-Q4): %Tr (server response
# time) is the Golden-Signals LATENCY signal; %Tt (total time, client-inclusive)
# is captured as CONTEXT only and must not be mistaken for the signal.
#
# Runtime transport edge (ADR-0084 Amendment 2026-06-17, issue #28 / Defect B):
# HAProxy has no native file logging — its first-class sink is SYSLOG. We send
# the pinned access-log format over TCP syslog to the gs-log-shipper listener on
# the internal gs-net (service name `gs-log-shipper`, port 514). TCP (not UDP):
# UDP silently drops under pressure, contradicting ENV-FR-04 ("never silently
# discard") and the shipper_delivery_ratio >= 99.9% SLI; TCP gives a connected,
# flow-controlled stream. The shipper listener is NOT host-published (ENV-FR-12).
#
# Refs: SPEC-LGS-002 §1.1/§7/§8/§9.1, ADR-0084 (Amendment 2026-06-17), ADR-0068,
# ADR-0085. Issue #23, #28.

global
    # `format raw` suppresses HAProxy's own syslog header so the frame payload is
    # exactly the pinned `GSLOG\t…` line (the shipper still strips a leading
    # <PRI> defensively). `tcp@` selects a TCP syslog target (vs default UDP).
    log tcp@gs-log-shipper:514 format raw local0 info
    maxconn 2048

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

    # ── Pinned Golden-Signals access-log format (ENV-FR-02) ──────────────────
    # Tab-separated key=value pairs with a leading GSLOG sentinel so the shipper
    # parses unambiguously regardless of spaces in paths/backends.
    #   ts      = request accept time, epoch MILLISECONDS  (%Ts*1000 + %ms)
    #   method  = HTTP method (context; not a §9.1 field)
    #   path    = request path (passed through faithfully — ADR-0084 §2)
    #   status  = HTTP status  (%ST)
    #   Tr      = server response time ms (%Tr) — the LATENCY signal
    #   Tt      = total time ms (%Tt) — CONTEXT only
    #   bytes   = bytes sent   (%B)
    #   ci      = client IP    (%ci) — telemetry-L2 PII; masked by the service,
    #             confined to gs-net, never logged raw by the shipper (ENV-NFR-04)
    #   backend = backend name (%b) — context (optional)
    log-format "GSLOG\tts=%Ts%ms\tmethod=%HM\tpath=%HP\tstatus=%ST\tTr=%Tr\tTt=%Tt\tbytes=%B\tci=%ci\tbackend=%b"

# ── Frontend listener (host-published in the compose profile) ────────────────
frontend gs_frontend
    bind *:8080
    default_backend gs_upstream

# ── Trivial upstream: canned 200 so HAProxy logs realistic access lines ──────
# (ADR-0085 / SPEC-LGS-002 §7 — HAProxy fronts a trivial upstream OR returns
# canned responses purely so it emits genuine access-log lines across paths.)
# Uses an http-request return so no real backend container is required.
backend gs_upstream
    http-request return status 200 content-type "application/json" string "{\"ok\":true}\n"
