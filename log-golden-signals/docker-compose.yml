version: "3.9"

networks:
  golden-signals-net:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    container_name: gs_redis
    command: redis-server --save "" --appendonly no
    networks:
      - golden-signals-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  whoami:
    image: traefik/whoami:latest
    container_name: gs_whoami
    networks:
      - golden-signals-net

  haproxy:
    build: ./haproxy
    container_name: gs_haproxy
    ports:
      - "80:80"
    networks:
      - golden-signals-net
    depends_on:
      - whoami

  ingestion_api:
    build: ./ingestion_api
    container_name: gs_ingestion_api
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      SATURATION_BYTES_THRESHOLD: "1000000"
    networks:
      - golden-signals-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  metrics_processor:
    build: ./metrics_processor
    container_name: gs_metrics_processor
    ports:
      - "8002:8002"
    environment:
      REDIS_URL: redis://redis:6379/0
      RETENTION_1M_SECONDS: "7200"
      RETENTION_5M_SECONDS: "86400"
    networks:
      - golden-signals-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics_api:
    build: ./analytics_api
    container_name: gs_analytics_api
    ports:
      - "8001:8001"
    environment:
      REDIS_URL: redis://redis:6379/0
      SATURATION_BYTES_THRESHOLD: "1000000"
    networks:
      - golden-signals-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
